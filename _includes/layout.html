<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%2032%2032%22%3E%3Ctext%20x=%2216%22%20y=%2216%22%20text-anchor=%22middle%22%20dominant-baseline=%22middle%22%20font-size=%2232%22%3E🧑‍🚀%3C/text%3E%3C/svg%3E"
    />
    <title>{{ title | default: "xmit dev team" }}</title>
    <link rel="alternate" type="application/json" href="/feed.json" />
    <meta name="description" content="xmit dev team's blog" />
    <style>
      :root {
        --bg: #0d1017;
        --panel: #141922;
        --border: #232a36;
        --text: #c2cad6;
        --muted: #7c8798;
        --heading: #f2f5fa;
        --accent: #ffd24a;
        --accent-dim: #b9922a;
        --measure: 49rem;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        color: var(--text);
        background: radial-gradient(1200px 600px at 50% -10%, #1a2130, var(--bg) 60%);
        background-attachment: fixed;
        min-height: 100svh;
        font-family: system-ui, sans-serif;
        font-size: 17px;
        line-height: 1.65;
        margin: 0;
        padding: 0;
        font-variant-numeric: tabular-nums;
        -webkit-font-smoothing: antialiased;
      }

      pre,
      code {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 0.9em;
      }

      a {
        color: var(--accent);
        text-decoration: none;
        transition: color 0.15s ease;
      }

      a:hover {
        color: #fff;
      }

      header,
      footer {
        text-align: center;
      }

      header {
        padding: 2.5rem 1rem 2rem;
        border-bottom: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.25);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 5vw, 2.6rem);
        letter-spacing: -0.02em;
        color: var(--heading);
      }

      h1 a {
        color: inherit;
      }

      h1 a:hover {
        color: var(--accent);
      }

      h2,
      h3 {
        color: var(--heading);
        letter-spacing: -0.01em;
        line-height: 1.25;
      }

      main {
        max-width: var(--measure);
        margin: 0 auto;
        padding: 2.5rem 1.25rem;
      }

      main h2 {
        margin: 2em 0 0.6em;
        padding-bottom: 0.35em;
        border-bottom: 1px solid var(--border);
        font-size: 1.05rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      main h2:first-child {
        margin-top: 0;
      }

      main ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      main > ul li {
        padding: 0.5em 0;
        border-bottom: 1px solid transparent;
      }

      article {
        max-width: var(--measure);
        border: 1px solid var(--border);
        border-radius: 0.75em;
        background-color: var(--panel);
        margin: 1.5rem auto;
        padding: clamp(1.25rem, 4vw, 2.5rem);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.03) inset,
          0 20px 40px -24px rgba(0, 0, 0, 0.7);
      }

      article > :first-child {
        margin-top: 0;
      }

      article > :last-child {
        margin-bottom: 0;
      }

      article h2 {
        margin: 1.8em 0 0.5em;
        font-size: 1.4rem;
      }

      article h3 {
        margin: 1.5em 0 0.4em;
        font-size: 1.15rem;
      }

      article ul,
      article ol {
        padding-left: 1.3em;
      }

      article li:not(:last-child) {
        margin-bottom: 0.4em;
      }

      article img {
        max-width: 100%;
        height: auto;
        border-radius: 0.5em;
      }

      blockquote {
        margin: 1.2em 0;
        padding: 0.2em 1.1em;
        border-left: 3px solid var(--accent-dim);
        color: var(--muted);
      }

      code {
        background: rgba(255, 255, 255, 0.06);
        padding: 0.15em 0.4em;
        border-radius: 0.35em;
      }

      pre {
        background: #0a0d13;
        border: 1px solid var(--border);
        border-radius: 0.6em;
        padding: 1em 1.1em;
        overflow-x: auto;
        white-space: pre;
        line-height: 1.5;
      }

      pre code {
        background: none;
        padding: 0;
      }

      hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 2em 0;
      }

      article header {
        text-align: left;
        padding: 0;
        border: none;
        background: none;
        margin-bottom: 1.5rem;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      footer {
        max-width: var(--measure);
        margin: 3rem auto 0;
        padding: 0 1.25rem 2.5rem;
        color: var(--muted);
        font-size: 0.92rem;
      }

      footer p {
        margin: 0;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>{{ title | default: "🧑‍🚀 xmit dev team" }}</h1>
    </header>
    {{ content }}
    <footer>
      <p>
        We make <a href="https://xmit.co">xmit.co</a> and other
        <a href="/posts/small-things/">small things</a>, and blog at
        <a href="https://xmit.dev">xmit.dev</a>.<br />
	Subscribe to our <a href="/feed.json">feed</a>,
	<a href="https://found.as/donations">donate</a>.
      </p>
    </footer>
  </body>
</html>
